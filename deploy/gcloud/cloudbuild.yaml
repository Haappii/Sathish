steps:
  # Step 1: Build the Docker image from root (multi-stage: frontend + backend)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/shop-billing-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/shop-billing-backend:latest'
      - '.'

  # Step 2: Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/shop-billing-backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/shop-billing-backend:latest']

  # Step 3: Deploy to Cloud Run (asia-southeast1 — supports domain mappings)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'shop-billing-backend'
      - '--image=gcr.io/$PROJECT_ID/shop-billing-backend:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=^||^APP_ENV=production||ALLOWED_ORIGINS=https://haappiibilling.in,https://www.haappiibilling.in,https://shop-billing-backend-316182685030.asia-southeast1.run.app||JWT_ALGORITHM=HS256||ACCESS_TOKEN_EXPIRE_MINUTES=1440||SUPPORT_EMAIL_ENABLED=true||SUPPORT_SENDER_EMAIL=haappiibilling@gmail.com||SUPPORT_SMTP_HOST=smtp.gmail.com||SUPPORT_SMTP_PORT=465'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,SUPPORT_SENDER_PASSWORD=SMTP_PASSWORD:latest'
      - '--add-cloudsql-instances=haappiibilling:asia-south1:shop-billing-db'

images:
  - 'gcr.io/$PROJECT_ID/shop-billing-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/shop-billing-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
