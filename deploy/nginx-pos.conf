server {
    listen 80;
    server_name 51.21.224.224 _;

    # React build output
    root /home/ubuntu/Sathish/frontend/dist;
    index index.html;

    # Serve static assets with long cache (hashed filenames)
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Downloadable desktop/mobile installers
    location /downloads/ {
        alias /home/ubuntu/Sathish/downloads/;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # API -> FastAPI (keep backend private on localhost)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
