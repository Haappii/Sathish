server {
    listen 80;
    listen 443 ssl;
    server_name haappiibilling.in www.haappiibilling.in;

    # SSL certificates (provisioned by certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/haappiibilling.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/haappiibilling.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Redirect plain HTTP to HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    root /home/ubuntu/Sathish/frontend/dist;
    index index.html;

    # Allow uploads up to 10 MB (logo uploads etc.)
    client_max_body_size 10M;

    # Serve static assets with long cache (hashed filenames)
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Downloadable desktop/mobile installers
    location /downloads/ {
        alias /home/ubuntu/Sathish/downloads/;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # API -> FastAPI (keep backend private on localhost)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
